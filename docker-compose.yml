services:
  db:
    image: pgvector/pgvector:pg16
    container_name: agenticrag-db
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: agenticrag-app
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
